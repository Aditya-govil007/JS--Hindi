<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API learning</title>
</head>
<body style="background-color: rgb(56, 49, 49);color: aliceblue;">
    
</body>
<script>
    const requesturl='https://api.github.com/users/Aditya-govil007'
    const xhr=new XMLHttpRequest();
    xhr.open('GET',requesturl)
    
    xhr.onreadystatechange=function(){
        console.log(xhr.readyState);
        if (xhr.readyState===4) {
            const data = JSON.parse(this.responseText);   //this use krna jaroori hai     
            console.log(typeof data);
            console.log(data.followers);
            
              

            
        }
    }
     // this function mean continuos state chnage  
    xhr.send()
</script>
</html>
