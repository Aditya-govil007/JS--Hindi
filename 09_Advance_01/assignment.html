<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body style="background-color: darkturquoise; color: aliceblue">
    <button id="hiteshchoudhary">Details</button>
    <div id="card"></div>
  </body>
  <script>

    const detail=document.getElementById('hiteshchoudhary')
    detail.addEventListener('click',function(){
        const requesturl='https://api.github.com/users/hiteshchoudhary'
        const xhr=new XMLHttpRequest();
        xhr.open('GET',requesturl)
        xhr.onreadystatechange=function(){
            console.log(xhr.readyState);
            if (xhr.readyState===4) {
                const data = JSON.parse(this.responseText);   //this use krna jaroori hai
                
                const card=document.getElementById('card')
                
                card.innerHTML=`
                <div style="background:white;color:black;width:250px;margin:20px auto;padding:20px;border-radius:10px">
                    <img src="${data.avatar_url}" width="100" style="border-radius:50%">
                    <h3>${data.name}</h3>
                    <p>Followers: ${data.followers}</p>

                </div>
                `



            }
        }

        xhr.send()
    })

</script>
</html>
